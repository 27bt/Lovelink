<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lovelink 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08060f;--surface:#110e1c;--surface2:#1a1528;--border:rgba(255,255,255,.08);
  --purple:#b77fff;--purple2:#7c6aff;--pink:#ff6eb4;--green:#5fffa0;--yellow:#ffd97d;--red:#ff6b6b;
  --text:#f0e8ff;--muted:#7a6a96;--muted2:#a08cc0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden}
body{display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh}

/* bg glow */
body::before{content:'';position:fixed;top:-30%;left:-20%;width:60vw;height:60vw;background:radial-gradient(circle,rgba(183,127,255,.07),transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50vw;height:50vw;background:radial-gradient(circle,rgba(255,110,180,.05),transparent 70%);pointer-events:none;z-index:0}

#app{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
.screen{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;animation:up .35s cubic-bezier(.22,1,.36,1)}
.hidden{display:none!important}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

/* typography */
.title{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:700;letter-spacing:-1px;text-align:center;background:linear-gradient(135deg,#e0bbff,#b77fff,#ff6eb4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--muted2);font-size:.95rem;text-align:center;font-style:italic}
.section-label{font-size:.7rem;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:6px}

/* cards */
.card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px}
.card-glass{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:22px;width:100%}

/* inputs */
input{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:var(--text);font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none;transition:.2s}
input:focus{border-color:var(--purple);background:rgba(183,127,255,.08);box-shadow:0 0 0 3px rgba(183,127,255,.1)}
input::placeholder{color:var(--muted)}
input.code-inp{text-align:center;font-size:1.6rem;letter-spacing:8px;font-weight:700;font-family:'Playfair Display',serif;color:var(--purple)}

/* buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:14px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.18s;text-align:center}
.btn+.btn{margin-top:8px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 4px 20px rgba(183,127,255,.25)}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(183,127,255,.4)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-outline{background:transparent;border:1.5px solid rgba(183,127,255,.35);color:var(--purple)}
.btn-outline:hover{background:rgba(183,127,255,.08);border-color:var(--purple)}
.btn-ghost{background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;padding:8px;font-family:'DM Sans',sans-serif;width:100%;text-align:center}
.btn-ghost:hover{color:var(--muted2)}
.btn-icon{display:flex;align-items:center;justify-content:center;gap:8px}
.btn-send{padding:13px 20px;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:14px;color:#fff;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.18s;white-space:nowrap;font-size:.9rem;flex-shrink:0}
.btn-send:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(183,127,255,.35)}
.btn-send.guess-btn{background:linear-gradient(135deg,#6eb4ff,var(--purple2))}

/* home */
.hero{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0 6px}
.hearts-row{font-size:1.3rem;letter-spacing:10px;animation:pulse 2.5s infinite;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-btns{display:flex;flex-direction:column;gap:10px;width:100%}

/* room code box */
.code-box{width:100%;background:linear-gradient(135deg,rgba(183,127,255,.12),rgba(255,110,180,.08));border:1px solid rgba(183,127,255,.2);border-radius:22px;padding:26px;text-align:center;position:relative;overflow:hidden}
.code-box::before{content:'';position:absolute;top:0;left:-100%;width:300%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 4s linear infinite;background-size:200% auto}
.big-code{font-family:'Playfair Display',serif;font-size:2.8rem;color:var(--purple);display:block;letter-spacing:10px;margin:8px 0;text-shadow:0 0 30px rgba(183,127,255,.4)}
.code-hint{font-size:.8rem;color:var(--muted);margin-top:2px}

/* players */
.players-list{display:flex;flex-direction:column;gap:8px;width:100%}
.player-pill{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:12px 16px}
.player-pill .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.player-pill .pname{font-size:.95rem;font-weight:500;flex:1}
.player-pill .crown{font-size:1rem}
.waiting-pulse{color:var(--muted);font-size:.88rem;animation:pulse 1.8s infinite;text-align:center;padding:4px}

/* scoreboard */
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px 16px}
.score-side{display:flex;flex-direction:column;align-items:center;gap:3px}
.score-side.mine{align-items:flex-start}
.score-side.theirs{align-items:flex-end}
.s-name{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-pts{font-family:'Playfair Display',serif;font-size:2rem;color:var(--purple);line-height:1}
.s-divider{width:1px;height:36px;background:var(--border)}
.round-label{font-size:.75rem;color:var(--muted);text-align:center}

/* timer */
.timer-wrap{display:flex;justify-content:center;width:100%}
.timer-ring{position:relative;width:76px;height:76px}
.timer-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke .5s,stroke-dashoffset .5s}
.timer-ring .track{stroke:rgba(255,255,255,.07)}
.timer-ring .progress{stroke:var(--green)}
.timer-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--green);transition:color .5s}

/* role badge */
.role-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:30px;font-size:.82rem;font-weight:600;width:100%;justify-content:center}
.role-chip.giver{background:rgba(95,255,160,.08);color:var(--green);border:1px solid rgba(95,255,160,.18)}
.role-chip.guesser{background:rgba(110,180,255,.08);color:#6eb4ff;border:1px solid rgba(110,180,255,.18)}

/* secret word */
.secret-box{width:100%;background:linear-gradient(135deg,rgba(183,127,255,.1),rgba(124,106,255,.08));border:1.5px dashed rgba(183,127,255,.3);border-radius:18px;padding:20px;text-align:center}
.cat-tag{display:inline-block;padding:4px 12px;background:rgba(183,127,255,.15);border:1px solid rgba(183,127,255,.2);border-radius:20px;font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--purple);margin-bottom:10px}
.secret-word{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--text);display:block;line-height:1.2}
.instruction{font-size:.82rem;color:var(--muted);text-align:center}

/* clues */
.clues-area{display:flex;flex-wrap:wrap;gap:7px;min-height:38px;align-items:center;width:100%}
.clue-chip{padding:7px 14px;border-radius:20px;font-size:.82rem;animation:popIn .2s ease}
.clue-chip.sent{background:rgba(183,127,255,.15);border:1px solid rgba(183,127,255,.25);color:#d4b0ff}
.clue-chip.recv{background:rgba(110,180,255,.12);border:1px solid rgba(110,180,255,.2);color:#a8d4ff}
.waiting-clue{color:var(--muted);font-size:.85rem;animation:pulse 1.8s infinite}

/* input row */
.input-row{display:flex;gap:8px;align-items:center;width:100%}
.input-row input{margin:0;flex:1}

/* feedback */
.feedback{text-align:center;font-size:1rem;font-weight:600;padding:10px;border-radius:14px;width:100%;animation:popIn .25s ease}
.feedback.correct{background:rgba(95,255,160,.1);color:var(--green);border:1px solid rgba(95,255,160,.2)}
.feedback.wrong{background:rgba(255,107,107,.08);color:var(--red);border:1px solid rgba(255,107,107,.15)}

/* past guesses */
.guesses-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;width:100%}
.g-chip{padding:4px 11px;border-radius:20px;font-size:.78rem}
.g-chip.miss{background:rgba(255,107,107,.08);color:var(--red);border:1px solid rgba(255,107,107,.15)}
.g-chip.hit{background:rgba(95,255,160,.1);color:var(--green);border:1px solid rgba(95,255,160,.2)}

/* category hint for guesser */
.cat-hint{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:rgba(183,127,255,.07);border:1px solid rgba(183,127,255,.15);border-radius:14px;width:100%}
.cat-hint span{font-size:.85rem;color:var(--muted2)}
.cat-hint strong{color:var(--purple);font-size:.9rem}

/* result */
.trophy-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px}
.trophy-emoji{font-size:4.5rem;animation:float 2s ease-in-out infinite}
.winner-text{font-family:'Playfair Display',serif;font-size:1.9rem;text-align:center;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.final-scores{width:100%;border-radius:18px;overflow:hidden;border:1px solid var(--border)}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);gap:10px}
.score-row:last-child{border-bottom:none}
.score-row.mine{background:linear-gradient(90deg,rgba(183,127,255,.08),var(--surface))}
.score-row .rname{font-size:.95rem;font-weight:500}
.score-row .rpts{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--purple)}

/* toast */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.25);border-radius:14px;padding:10px 20px;color:var(--red);font-size:.85rem;z-index:99;max-width:88vw;text-align:center;backdrop-filter:blur(10px)}

/* divider */
.divider{width:100%;height:1px;background:var(--border);margin:2px 0}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen">
    <div class="hero">
      <div class="hearts-row">♥ ♡ ♥</div>
      <div class="title">Lovelink</div>
      <p class="subtitle">A guessing game for two 💌</p>
    </div>
    <div class="home-btns" id="home-main">
      <button class="btn btn-primary btn-icon" onclick="showMode('create')">✨ Create Room</button>
      <button class="btn btn-outline btn-icon" onclick="showMode('join')">🔗 Join Room</button>
    </div>
    <div id="home-create" class="card hidden" style="display:none;flex-direction:column;gap:6px">
      <div class="section-label">Your Name</div>
      <input id="create-name" placeholder="e.g. Kusia" maxlength="16"/>
      <button class="btn btn-primary" style="margin-top:10px" onclick="handleCreate()">Get Room Code →</button>
      <button class="btn-ghost" onclick="showMode(null)">← Back</button>
    </div>
    <div id="home-join" class="card hidden" style="display:none;flex-direction:column;gap:6px">
      <div class="section-label">Your Name</div>
      <input id="join-name" placeholder="e.g. Rita" maxlength="16"/>
      <div class="section-label" style="margin-top:10px">Room Code</div>
      <input id="join-code" class="code-inp" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-primary" style="margin-top:10px" onclick="handleJoin()">Join →</button>
      <button class="btn-ghost" onclick="showMode(null)">← Back</button>
    </div>
  </div>

  <!-- WAITING -->
  <div id="screen-waiting" class="screen hidden">
    <div class="code-box">
      <div class="section-label">Room Code</div>
      <span class="big-code" id="w-code"></span>
      <div class="code-hint">Share with your partner 💜</div>
    </div>
    <div class="players-list" id="w-players"></div>
    <button class="btn btn-primary" id="w-start" style="display:none" onclick="handleStart()">Start Game ✨</button>
    <button class="btn-ghost" onclick="handleLeave()">Leave Room</button>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen hidden">
    <div class="scoreboard">
      <div class="score-side mine">
        <div class="s-name" id="g-my-name">You</div>
        <div class="s-pts" id="g-my-score">0</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="s-divider"></div>
        <div class="round-label" id="g-round">1/5</div>
        <div class="s-divider"></div>
      </div>
      <div class="score-side theirs">
        <div class="s-name" id="g-partner-name">Partner</div>
        <div class="s-pts" id="g-partner-score">0</div>
      </div>
    </div>

    <div class="timer-wrap">
      <div class="timer-ring" id="timer-ring">
        <svg width="76" height="76" viewBox="0 0 76 76">
          <circle class="track" cx="38" cy="38" r="34" stroke-dasharray="213.6" stroke-dashoffset="0"/>
          <circle class="progress" id="timer-arc" cx="38" cy="38" r="34" stroke-dasharray="213.6" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-inner" id="timer-txt">2:00</div>
      </div>
    </div>

    <!-- GIVER -->
    <div class="panel" id="giver-panel" style="display:flex;flex-direction:column;gap:12px;width:100%">
      <div class="role-chip giver">🗣️ You are giving clues this round</div>
      <div class="secret-box">
        <div class="cat-tag" id="g-cat-giver"></div>
        <span class="secret-word" id="g-word"></span>
      </div>
      <p class="instruction">Describe the word — don't say it, spell it, or rhyme it!</p>
      <div class="clues-area" id="g-clues-sent"></div>
      <div class="input-row">
        <input id="clue-input" placeholder="Type a clue and press Enter…" maxlength="50" onkeydown="if(event.key==='Enter')sendClue()"/>
        <button class="btn-send" onclick="sendClue()">Send</button>
      </div>
    </div>

    <!-- GUESSER -->
    <div class="panel hidden" id="guesser-panel" style="flex-direction:column;gap:12px;width:100%">
      <div class="role-chip guesser">🤔 Your turn to guess!</div>
      <div class="cat-hint">
        <span>Category:</span>
        <strong id="g-cat-guesser">—</strong>
      </div>
      <div class="clues-area" id="g-clues-recv"></div>
      <div id="g-feedback" class="feedback hidden"></div>
      <div class="input-row">
        <input id="guess-input" placeholder="What's the word?" maxlength="40" onkeydown="if(event.key==='Enter')sendGuess()"/>
        <button class="btn-send guess-btn" onclick="sendGuess()">Guess!</button>
      </div>
      <div class="guesses-row" id="g-past"></div>
    </div>

    <button class="btn-ghost" style="font-size:.78rem;margin-top:2px" onclick="handleLeave()">Leave Game</button>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen hidden">
    <div class="trophy-wrap">
      <div class="trophy-emoji" id="r-trophy">🏆</div>
      <div class="winner-text" id="r-title">You won!</div>
    </div>
    <div class="final-scores" id="r-scores"></div>
    <button class="btn btn-primary" style="margin-top:4px" onclick="handlePlayAgain()">Play Again 🔄</button>
    <button class="btn-ghost" onclick="handleLeave()">Leave</button>
  </div>

</div>
<div id="toast" class="toast hidden"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL:"https://lovelink-8af5f-default-rtdb.firebaseio.com" },"lovelink");
const db  = getDatabase(app);

// ── Words ────────────────────────────────────────────────────────────────────
const CATS = {
  "🌍 Places":["Eiffel Tower","Amazon Rainforest","Great Wall","Sahara Desert","Grand Canyon","Niagara Falls","Machu Picchu","Antarctica","Venice","Tokyo","Stonehenge","Kilimanjaro","Dead Sea","Colosseum","Santorini","Iceland","Maldives","Petra","Serengeti","Bali"],
  "🐾 Animals":["Penguin","Elephant","Chameleon","Platypus","Flamingo","Narwhal","Axolotl","Meerkat","Capybara","Wolverine","Pangolin","Komodo Dragon","Snow Leopard","Mantis Shrimp","Firefly","Peacock","Jellyfish","Crocodile","Dragonfly","Hummingbird"],
  "🍕 Food":["Spaghetti","Sushi","Croissant","Guacamole","Tiramisu","Ramen","Churros","Baklava","Poutine","Kimchi","Bruschetta","Paella","Shawarma","Tapioca","Matcha","Espresso","Fondue","Dumpling","Gelato","Waffles"],
  "🎬 Movies & TV":["Inception","Titanic","Avengers","The Matrix","Jurassic Park","Star Wars","Harry Potter","The Lion King","Interstellar","Gladiator","Frozen","Batman","Shrek","Toy Story","Joker","Avatar","Parasite","Dune","The Notebook","Clueless"],
  "🎵 Music":["Guitar","Saxophone","Drum Kit","Violin","Microphone","Turntable","Music Festival","Karaoke","Lullaby","Symphony","Trumpet","Piano","Choir","Beatbox","Vinyl Record","Album Cover","Encore","Remix","Acapella","Headphones"],
  "⚽ Sports":["Marathon","Skateboard","Surfing","Rock Climbing","Gymnastics","Archery","Fencing","Bobsled","Synchronized Swimming","Weightlifting","Triathlon","Bungee Jump","Paragliding","Snorkeling","Curling","Rowing","Parkour","Arm Wrestling","Dodgeball","Polo"],
  "🔬 Science":["Black Hole","DNA","Volcano","Telescope","Microscope","Aurora Borealis","Earthquake","Tornado","Tsunami","Supernova","Eclipse","Glacier","Coral Reef","Photosynthesis","Asteroid","Avalanche","Constellation","Lightning","Tectonic Plates","Wormhole"],
  "🏠 Objects":["Umbrella","Hammock","Trampoline","Lighthouse","Fireworks","Treasure","Library","Submarine","Spaceship","Hourglass","Compass","Lantern","Typewriter","Hot Air Balloon","Periscope","Windmill","Drawbridge","Catapult","Chandelier","Suitcase"],
  "😂 Fun & Weird":["Unicorn","Zombie","Mermaid","Time Travel","Teleportation","Invisibility","Clone","Parallel Universe","Dragon","Magic Carpet","Genie","Talking Parrot","Giant Squid","Haunted House","Yeti","Werewolf","Mind Reading","Shrink Ray","Fairy Tale","Quicksand"],
  "💑 Romance":["Candlelight Dinner","First Kiss","Love Letter","Surprise Date","Stargazing","Slow Dance","Honeymoon","Proposal","Anniversary","Serenade","Bouquet","Valentine","Picnic","Sunset Walk","Secret Admirer","Long Distance","Jealousy","Butterflies","Heartbeat","Soulmate"],
};
const ALL = Object.entries(CATS).flatMap(([cat,words])=>words.map(w=>({w,cat})));
function randEntry(){ return ALL[Math.floor(Math.random()*ALL.length)]; }

const ROUND_TIME=120, MAX_ROUNDS=6;
const SESSION_KEY="lovelink_session";
let myId = localStorage.getItem("lovelink_pid");
if(!myId){myId="p_"+Math.random().toString(36).slice(2,10);localStorage.setItem("lovelink_pid",myId);}
let myName="",roomId=null,unsub=null,timerInterval=null,currentRoom=null;

const $=id=>document.getElementById(id);
const show=id=>{const e=$(id);e.classList.remove("hidden");if(e.style.display==="none")e.style.display="flex"};
const hide=id=>{$(id).classList.add("hidden");};
const rRef=()=>ref(db,`rooms/${roomId}`);
const getRoom=async()=>(await get(rRef())).val();
const patchRoom=data=>update(rRef(),data);
const saveSession=()=>localStorage.setItem(SESSION_KEY,JSON.stringify({myName,roomId}));
const clearSession=()=>localStorage.removeItem(SESSION_KEY);

function goScreen(name){
  ["home","waiting","game","result"].forEach(s=>s===name?show("screen-"+s):hide("screen-"+s));
}
function showError(msg){
  const t=$(  "toast");t.textContent=msg;t.classList.remove("hidden");
  setTimeout(()=>t.classList.add("hidden"),3500);
}
window.showMode=mode=>{
  hide("home-main");hide("home-create");hide("home-join");
  if(!mode)show("home-main");
  else if(mode==="create")show("home-create");
  else show("home-join");
};

// ── Listener ──────────────────────────────────────────────────────────────────
function listenRoom(){
  if(unsub)unsub();
  unsub=onValue(rRef(),snap=>{
    const r=snap.val(); if(!r)return;
    const prev=currentRoom?.phase;
    currentRoom=r;
    if(r.phase==="waiting"&&prev==="result"){renderWaiting();goScreen("waiting");}
    else if(r.phase==="playing"&&prev!=="playing"){renderGame();}
    else if(r.phase==="result"&&prev!=="result"){stopTimer();renderResult();goScreen("result");}
    else if(r.phase==="playing"){refreshGame();}
    else if(r.phase==="waiting"){renderWaiting();}
    // host advances on timeout
    if(r.phase==="playing"&&r.hostId===myId&&r.currentRound?.startedAt){
      if(Math.floor((Date.now()-r.currentRound.startedAt)/1000)>=ROUND_TIME) advanceRound(r);
    }
  });
}

// ── Session restore ───────────────────────────────────────────────────────────
async function tryRestore(){
  const raw=localStorage.getItem(SESSION_KEY); if(!raw)return;
  try{
    const s=JSON.parse(raw); myName=s.myName; roomId=s.roomId;
    const r=await getRoom();
    if(!r||!r.players?.[myId]){clearSession();return;}
    currentRoom=r;
    if(r.phase==="waiting"){renderWaiting();goScreen("waiting");}
    else if(r.phase==="playing"){renderGame();goScreen("game");}
    else if(r.phase==="result"){renderResult();goScreen("result");}
    listenRoom();
  }catch{clearSession();}
}

// ── Create / Join ─────────────────────────────────────────────────────────────
window.handleCreate=async()=>{
  const n=$("create-name").value.trim(); if(!n)return;
  myName=n; roomId=Math.random().toString(36).slice(2,8).toUpperCase();
  const room={id:roomId,hostId:myId,phase:"waiting",players:{[myId]:{id:myId,name:n}},scores:{[myId]:0},round:0,maxRounds:MAX_ROUNDS,currentRound:null};
  await set(rRef(),room); currentRoom=room; saveSession();
  renderWaiting(); goScreen("waiting"); listenRoom();
};
window.handleJoin=async()=>{
  const n=$("join-name").value.trim(), code=$("join-code").value.trim();
  if(!n||code.length!==6)return;
  myName=n; roomId=code;
  const ex=await getRoom();
  if(!ex){showError("Room not found. Double-check the code.");roomId=null;return;}
  if(Object.keys(ex.players||{}).length>=2&&!ex.players[myId]){showError("Room is full!");roomId=null;return;}
  await update(ref(db,`rooms/${roomId}/players`),{[myId]:{id:myId,name:n}});
  await update(ref(db,`rooms/${roomId}/scores`),{[myId]:ex.scores?.[myId]??0});
  currentRoom=await getRoom(); saveSession();
  renderWaiting(); goScreen("waiting"); listenRoom();
};

// ── Waiting ────────────────────────────────────────────────────────────────────
function renderWaiting(){
  $("w-code").textContent=currentRoom.id;
  const pl=Object.values(currentRoom.players||{});
  const list=$("w-players"); list.innerHTML="";
  pl.forEach(p=>{
    const d=document.createElement("div"); d.className="player-pill";
    const initials=p.name.slice(0,2).toUpperCase();
    d.innerHTML=`<div class="avatar">${initials}</div><div class="pname">${p.name}</div>${p.id===currentRoom.hostId?'<span class="crown">👑</span>':""}`;
    list.appendChild(d);
  });
  if(pl.length<2){const w=document.createElement("div");w.className="waiting-pulse";w.textContent="Waiting for partner to join…";list.appendChild(w);}
  $("w-start").style.display=(pl.length>=2&&currentRoom.hostId===myId)?"block":"none";
}
window.handleStart=async()=>{
  const e=randEntry();
  // Alternate: host gives clues in round 1
  await patchRoom({phase:"playing",round:1,currentRound:{word:e.w,category:e.cat,giverId:myId,clues:[],guesses:[],startedAt:Date.now(),solved:false}});
};

// ── Game ───────────────────────────────────────────────────────────────────────
function renderGame(){goScreen("game");refreshGame();startTimer();}

function startTimer(){
  stopTimer();
  const arc=$("timer-arc"), txt=$("timer-txt"), ring=$("timer-ring");
  const CIRC=213.6;
  timerInterval=setInterval(()=>{
    if(!currentRoom?.currentRound?.startedAt)return;
    const elapsed=Math.floor((Date.now()-currentRoom.currentRound.startedAt)/1000);
    const left=Math.max(0,ROUND_TIME-elapsed);
    const mins=Math.floor(left/60), secs=left%60;
    txt.textContent=`${mins}:${secs.toString().padStart(2,"0")}`;
    arc.style.strokeDashoffset=CIRC*(1-left/ROUND_TIME);
    const color=left>60?"var(--green)":left>30?"var(--yellow)":"var(--red)";
    arc.style.stroke=color; txt.style.color=color;
  },400);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}

function refreshGame(){
  const r=currentRoom?.currentRound||{};
  const isGiver=r.giverId===myId;
  const pl=currentRoom?.players||{}, sc=currentRoom?.scores||{};
  const partner=Object.values(pl).find(p=>p.id!==myId);
  $("g-my-name").textContent=myName;
  $("g-partner-name").textContent=partner?.name||"Partner";
  $("g-my-score").textContent=sc[myId]||0;
  $("g-partner-score").textContent=sc[partner?.id]||0;
  $("g-round").textContent=`Round ${currentRoom?.round||1} of ${currentRoom?.maxRounds||MAX_ROUNDS}`;

  if(isGiver){
    show("giver-panel"); hide("guesser-panel");
    $("g-word").textContent=r.word||"";
    $("g-cat-giver").textContent=r.category||"";
    const ca=$("g-clues-sent"); ca.innerHTML="";
    (r.clues||[]).forEach(c=>{const s=document.createElement("span");s.className="clue-chip sent";s.textContent=c;ca.appendChild(s);});
  } else {
    hide("giver-panel"); show("guesser-panel");
    $("g-cat-guesser").textContent=r.category||"…";
    const cd=$("g-clues-recv"); cd.innerHTML="";
    if(!(r.clues||[]).length){const s=document.createElement("span");s.className="waiting-clue";s.textContent="Waiting for first clue…";cd.appendChild(s);}
    else (r.clues||[]).forEach(c=>{const s=document.createElement("span");s.className="clue-chip recv";s.textContent=c;cd.appendChild(s);});
    const pg=$("g-past"); pg.innerHTML="";
    (r.guesses||[]).forEach(g=>{const s=document.createElement("span");s.className="g-chip "+(g.toLowerCase()===(r.word||"").toLowerCase()?"hit":"miss");s.textContent=g;pg.appendChild(s);});
  }
}

window.sendClue=async()=>{
  const inp=$("clue-input"), clue=inp.value.trim(); if(!clue)return; inp.value="";
  const fresh=await getRoom(); if(!fresh)return;
  await update(ref(db,`rooms/${roomId}/currentRound`),{clues:[...(fresh.currentRound?.clues||[]),clue]});
};

window.sendGuess=async()=>{
  const inp=$("guess-input"), guess=inp.value.trim(); if(!guess)return; inp.value="";
  const fresh=await getRoom(); if(!fresh)return;
  const correct=guess.toLowerCase()===(fresh.currentRound?.word||"").toLowerCase();
  const elapsed=Math.floor((Date.now()-fresh.currentRound.startedAt)/1000);
  const pts=correct?Math.max(1,Math.ceil(((ROUND_TIME-elapsed)/ROUND_TIME)*10)):0;
  const fb=$("g-feedback");
  fb.textContent=correct?"✅ Correct!":"❌ Nope, try again!";
  fb.className="feedback "+(correct?"correct":"wrong");
  fb.classList.remove("hidden");
  if(correct)setTimeout(()=>fb.classList.add("hidden"),2000);
  else setTimeout(()=>fb.classList.add("hidden"),1200);
  await update(ref(db,`rooms/${roomId}/currentRound`),{guesses:[...(fresh.currentRound?.guesses||[]),guess],solved:correct});
  await update(ref(db,`rooms/${roomId}/scores`),{[myId]:(fresh.scores?.[myId]||0)+pts});
  // any player advances on correct (not just host)
  if(correct) setTimeout(async()=>advanceRound(await getRoom()),2000);
};

async function advanceRound(r){
  // deduplicate: only advance if still in same round
  const current=await getRoom();
  if(!current||current.round!==r.round||current.phase!=="playing")return;
  const next=(r.round||1)+1;
  if(next>r.maxRounds){await patchRoom({phase:"result"});return;}
  const players=Object.values(r.players||{});
  // strict alternation: swap giver every round
  const prevGiver=r.currentRound?.giverId;
  const nextGiver=players.find(p=>p.id!==prevGiver)?.id||players[0]?.id;
  const e=randEntry();
  await patchRoom({round:next,currentRound:{word:e.w,category:e.cat,giverId:nextGiver,clues:[],guesses:[],startedAt:Date.now(),solved:false}});
}

// ── Result ─────────────────────────────────────────────────────────────────────
function renderResult(){
  const pl=currentRoom?.players||{}, sc=currentRoom?.scores||{};
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const wid=sorted[0]?.[0];
  $("r-trophy").textContent=wid===myId?"🏆":"💪";
  $("r-title").textContent=wid===myId?"You won! 🎉":`${pl[wid]?.name||"Partner"} wins! 🎉`;
  const sc2=$("r-scores"); sc2.innerHTML="";
  sorted.forEach(([id,pts])=>{
    const d=document.createElement("div"); d.className="score-row"+(id===myId?" mine":"");
    d.innerHTML=`<span class="rname">${pl[id]?.name||"Player"} ${id===wid?"👑":""}</span><span class="rpts">${pts} pts</span>`;
    sc2.appendChild(d);
  });
}
window.handlePlayAgain=async()=>{
  const reset={};Object.keys(currentRoom?.players||{}).forEach(id=>reset[id]=0);
  await patchRoom({phase:"waiting",round:0,scores:reset,currentRound:null});
};
window.handleLeave=async()=>{
  if(unsub){unsub();unsub=null;} stopTimer(); clearSession();
  if(roomId)await remove(ref(db,`rooms/${roomId}`));
  roomId=null;currentRoom=null;showMode(null);goScreen("home");
};

tryRestore();
</script>
