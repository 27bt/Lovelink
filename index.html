const ALL_ENTRIES = Object.entries(WORD_BANK).flatMap(([cat, words]) => words.map(w => ({ word: w, category: cat })));

function getShuffledDeck() {
  const shuffled = [...ALL_ENTRIES].sort(() => Math.random() - 0.5);
  return shuffled;
}

// ── Constants ─────────────────────────────────────────────────────────────────
const ROUND_TIME = 120;
const MAX_ROUNDS = 6;
const SESSION_KEY = "lovelink_session_v2";

// ── Helpers ───────────────────────────────────────────────────────────────────
function genCode() { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function getMyId() {
  let id = localStorage.getItem("lovelink_pid_v2");
  if (!id) { id = "p_" + Math.random().toString(36).slice(2,10); localStorage.setItem("lovelink_pid_v2", id); }
  return id;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [ready, setReady] = useState(false);
  const [screen, setScreen] = useState("home"); // home | waiting | game | result
  const [homeMode, setHomeMode] = useState(null); // null | create | join
  const [myId] = useState(getMyId);
  const [myName, setMyName] = useState("");
  const [roomId, setRoomId] = useState(null);
  const [room, setRoom] = useState(null);
  const [toast, setToast] = useState("");
  const [timeLeft, setTimeLeft] = useState(ROUND_TIME);
  const [feedback, setFeedback] = useState(null); // {msg, ok}
  const [usedWords, setUsedWords] = useState([]); // track used words per session

  const unsubRef = useRef(null);
  const timerRef = useRef(null);
  const roomIdRef = useRef(null);
  const usedWordsRef = useRef([]);

  roomIdRef.current = roomId;
  usedWordsRef.current = usedWords;

  useEffect(() => { initFirebase().then(() => { setReady(true); tryRestore(); }); }, []);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 3500); }

  // ── Timer ──────────────────────────────────────────────────────────────────
  function startTimer(startedAt) {
    stopTimer();
    timerRef.current = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startedAt) / 1000);
      const left = Math.max(0, ROUND_TIME - elapsed);
      setTimeLeft(left);
    }, 300);
  }
  function stopTimer() { clearInterval(timerRef.current); timerRef.current = null; }

  // ── Session ────────────────────────────────────────────────────────────────
  function saveSession(name, rid) {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ myName: name, roomId: rid }));
  }
  function clearSession() { localStorage.removeItem(SESSION_KEY); }

  async function tryRestore() {
    const raw = localStorage.getItem(SESSION_KEY); if (!raw) return;
    try {
      const s = JSON.parse(raw);
      const r = await fbGet(fbRef(`rooms/${s.roomId}`));
      const data = r.val();
      if (!data || !data.players?.[myId]) { clearSession(); return; }
      setMyName(s.myName); setRoomId(s.roomId);
      setRoom(data);
      if (data.phase === "waiting") setScreen("waiting");
      else if (data.phase === "playing") { setScreen("game"); if (data.currentRound?.startedAt) startTimer(data.currentRound.startedAt); }
      else if (data.phase === "result") setScreen("result");
      listenRoom(s.roomId);
    } catch { clearSession(); }
  }

  // ── Listen ─────────────────────────────────────────────────────────────────
  function listenRoom(rid) {
    if (unsubRef.current) unsubRef.current();
    unsubRef.current = fbOnValue(fbRef(`rooms/${rid}`), snap => {
      const r = snap.val(); if (!r) return;
      setRoom(prev => {
        const prevPhase = prev?.phase;
        if (r.phase === "playing" && prevPhase !== "playing") {
          if (r.currentRound?.startedAt) startTimer(r.currentRound.startedAt);
          setScreen("game");
        } else if (r.phase === "result" && prevPhase !== "result") {
          stopTimer(); setScreen("result");
        } else if (r.phase === "waiting" && prevPhase === "result") {
          setScreen("waiting");
        }
        // Timer sync: reset timer when round changes
        if (r.phase === "playing" && prev?.phase === "playing") {
          if (r.currentRound?.startedAt !== prev?.currentRound?.startedAt) {
            startTimer(r.currentRound.startedAt);
            setFeedback(null);
          }
        }
        return r;
      });
    });
  }

  // ── Create ─────────────────────────────────────────────────────────────────
  async function handleCreate(name) {
    if (!name.trim()) return;
    const rid = genCode();
    const deck = getShuffledDeck();
    const roomData = {
      id: rid, hostId: myId, phase: "waiting",
      players: { [myId]: { id: myId, name: name.trim() } },
      scores: { [myId]: 0 },
      round: 0, maxRounds: MAX_ROUNDS,
      currentRound: null,
      wordDeck: deck.slice(0, MAX_ROUNDS * 2), // pre-generate enough words
    };
    setMyName(name.trim()); setRoomId(rid); setRoom(roomData); setUsedWords([]);
    await fbSet(fbRef(`rooms/${rid}`), roomData);
    saveSession(name.trim(), rid);
    setScreen("waiting"); listenRoom(rid);
  }

  // ── Join ───────────────────────────────────────────────────────────────────
  async function handleJoin(name, code) {
    if (!name.trim() || code.length !== 6) return;
    const snap = await fbGet(fbRef(`rooms/${code}`));
    const ex = snap.val();
    if (!ex) { showToast("Room not found. Check the code."); return; }
    if (Object.keys(ex.players || {}).length >= 2 && !ex.players[myId]) { showToast("Room is already full!"); return; }
    await fbUpdate(fbRef(`rooms/${code}/players`), { [myId]: { id: myId, name: name.trim() } });
    await fbUpdate(fbRef(`rooms/${code}/scores`), { [myId]: ex.scores?.[myId] ?? 0 });
    setMyName(name.trim()); setRoomId(code);
    const snap2 = await fbGet(fbRef(`rooms/${code}`));
    setRoom(snap2.val());
    saveSession(name.trim(), code);
    setScreen("waiting"); listenRoom(code);
  }

  // ── Start ──────────────────────────────────────────────────────────────────
  async function handleStart() {
    const deck = room.wordDeck || getShuffledDeck().slice(0, MAX_ROUNDS * 2);
    const entry = deck[0]; // first word, giver = host
    await fbUpdate(fbRef(`rooms/${roomId}`), {
      phase: "playing", round: 1,
      currentRound: { word: entry.word, category: entry.category, giverId: myId, clues: [], guesses: [], startedAt: Date.now(), solved: false, deckIndex: 0 }
    });
  }

  // ── Next round ─────────────────────────────────────────────────────────────
  async function advanceRound(r, forced = false) {
    // Dedup: re-fetch and check we're still on same round
    const snap = await fbGet(fbRef(`rooms/${roomId}`));
    const fresh = snap.val();
    if (!fresh || fresh.round !== r.round || fresh.phase !== "playing") return;

    const next = (r.round || 1) + 1;
    if (next > r.maxRounds) { await fbUpdate(fbRef(`rooms/${roomId}`), { phase: "result" }); return; }
    const players = Object.values(r.players || {});
    const prevGiver = r.currentRound?.giverId;
    const nextGiver = players.find(p => p.id !== prevGiver)?.id || players[0]?.id;
    const deckIdx = (r.currentRound?.deckIndex ?? 0) + 1;
    const deck = r.wordDeck || [];
    const entry = deck[deckIdx] || getShuffledDeck()[0];

    await fbUpdate(fbRef(`rooms/${roomId}`), {
      round: next,
      currentRound: { word: entry.word, category: entry.category, giverId: nextGiver, clues: [], guesses: [], startedAt: Date.now(), solved: false, deckIndex: deckIdx }
    });
  }

  // ── Clue ───────────────────────────────────────────────────────────────────
  async function sendClue(clue) {
    const snap = await fbGet(fbRef(`rooms/${roomId}/currentRound`));
    const cr = snap.val(); if (!cr) return;
    await fbUpdate(fbRef(`rooms/${roomId}/currentRound`), { clues: [...(cr.clues || []), clue] });
  }

  // ── Guess ──────────────────────────────────────────────────────────────────
  async function sendGuess(guess) {
    const snap = await fbGet(fbRef(`rooms/${roomId}`));
    const fresh = snap.val(); if (!fresh) return;
    const correct = guess.trim().toLowerCase() === (fresh.currentRound?.word || "").toLowerCase();
    const elapsed = Math.floor((Date.now() - fresh.currentRound.startedAt) / 1000);
    const pts = correct ? Math.max(1, Math.ceil(((ROUND_TIME - elapsed) / ROUND_TIME) * 10)) : 0;
    const guesses = [...(fresh.currentRound?.guesses || []), guess.trim()];
    await fbUpdate(fbRef(`rooms/${roomId}/currentRound`), { guesses, solved: correct });
    if (pts > 0) await fbUpdate(fbRef(`rooms/${roomId}/scores`), { [myId]: (fresh.scores?.[myId] || 0) + pts });
    setFeedback({ msg: correct ? "✅ Correct!" : "❌ Nope, try again!", ok: correct });
    if (correct) setTimeout(() => { setFeedback(null); advanceRound(fresh); }, 1800);
    else setTimeout(() => setFeedback(null), 1200);
  }

  // ── Play again ─────────────────────────────────────────────────────────────
  async function handlePlayAgain() {
    const reset = {}; Object.keys(room?.players || {}).forEach(id => reset[id] = 0);
    const deck = getShuffledDeck().slice(0, MAX_ROUNDS * 2);
    await fbUpdate(fbRef(`rooms/${roomId}`), { phase: "waiting", round: 0, scores: reset, currentRound: null, wordDeck: deck });
  }

  // ── Leave ──────────────────────────────────────────────────────────────────
  async function handleLeave() {
    if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
    stopTimer(); clearSession();
    if (roomIdRef.current) await fbRemove(fbRef(`rooms/${roomIdRef.current}`));
    setRoomId(null); setRoom(null); setMyName(""); setScreen("home"); setHomeMode(null);
  }

  if (!ready) return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-purple-400 animate-pulse text-lg">Loading Lovelink…</div>
    </div>
  );

  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-md relative z-10">
        {toast && <Toast msg={toast} />}
        {screen === "home"    && <HomeScreen homeMode={homeMode} setHomeMode={setHomeMode} onCreate={handleCreate} onJoin={handleJoin} />}
        {screen === "waiting" && room && <WaitingScreen room={room} myId={myId} onStart={handleStart} onLeave={handleLeave} />}
        {screen === "game"    && room && <GameScreen room={room} myId={myId} myName={myName} timeLeft={timeLeft} feedback={feedback} onClue={sendClue} onGuess={sendGuess} onNext={() => advanceRound(room)} onLeave={handleLeave} />}
        {screen === "result"  && room && <ResultScreen room={room} myId={myId} onPlayAgain={handlePlayAgain} onLeave={handleLeave} />}
      </div>
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────────

  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-red-500/10 border border-red-500/20 backdrop-blur-xl rounded-2xl px-5 py-3 text-red-300 text-sm text-center max-w-xs fade-up">
      {msg}

  );
}

    <div className="flex flex-col items-center gap-4 fade-up">

        <div className="text-xs uppercase tracking-[3px] text-purple-400/70 mb-2">Room Code</div>

}

// ── Game ──────────────────────────────────────────────────────────────────────
function GameScreen({ room, myId, myName, timeLeft, feedback, onClue, onGuess, onNext, onLeave }) {
  const [clue, setClue] = useState("");
  const [guess, setGuess] = useState("");
  const cr = room?.currentRound || {};
  const isGiver = cr.giverId === myId;
  const players = room?.players || {};
  const scores = room?.scores || {};
  const partner = Object.values(players).find(p => p.id !== myId);
  const CIRC = 213.6;
  const progress = CIRC * (1 - timeLeft / ROUND_TIME);
  const timerColor = timeLeft > 60 ? "#4ade80" : timeLeft > 30 ? "#fbbf24" : "#f87171";
  const canGoNext = room.hostId === myId;

  return (
    <div className="flex flex-col gap-3 fade-up">
      {/* Scoreboard */}
      <div className="glass rounded-2xl px-5 py-4 flex items-center justify-between">
        <div className="flex flex-col">
          <span className="text-xs uppercase tracking-widest text-purple-300/50">{myName}</span>
          <span className="font-serif text-3xl text-purple-300">{scores[myId] || 0}</span>
        </div>
        <div className="flex flex-col items-center gap-0.5">
          <span className="text-xs text-purple-300/40">Round</span>
          <span className="text-lg font-bold text-white">{room.round}<span className="text-purple-300/40 text-sm">/{room.maxRounds}</span></span>
        </div>
        <div className="flex flex-col items-end">
          <span className="text-xs uppercase tracking-widest text-purple-300/50">{partner?.name || "Partner"}</span>
          <span className="font-serif text-3xl text-purple-300">{scores[partner?.id] || 0}</span>
        </div>
      </div>

      {/* Timer */}
      <div className="flex justify-center">
        <div className="relative w-20 h-20">
          <svg width="80" height="80" viewBox="0 0 76 76" style={{transform:'rotate(-90deg)'}}>
            <circle cx="38" cy="38" r="34" fill="none" strokeWidth="4" stroke="rgba(255,255,255,0.06)" strokeDasharray="213.6"/>
            <circle cx="38" cy="38" r="34" fill="none" strokeWidth="4" stroke={timerColor} strokeDasharray="213.6" strokeDashoffset={progress} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.4s, stroke 0.5s'}}/>
          </svg>
          <div className="absolute inset-0 flex items-center justify-center font-bold text-base" style={{color: timerColor}}>
            {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,"0")}
          </div>
        </div>
      </div>

      {/* Role chip */}
      <div className={`w-full text-center py-2.5 rounded-xl text-sm font-semibold ${isGiver ? "bg-green-400/8 text-green-400 border border-green-400/15" : "bg-blue-400/8 text-blue-300 border border-blue-400/15"}`}>
        {isGiver ? "🗣️ You are giving clues this round" : "🤔 Your turn to guess!"}
      </div>

      {isGiver ? (
        <div className="flex flex-col gap-3">
          <div className="rounded-2xl p-5 text-center" style={{background:'linear-gradient(135deg,rgba(168,85,247,0.1),rgba(124,106,255,0.08))',border:'1.5px dashed rgba(168,85,247,0.3)'}}>
            <div className="inline-block px-3 py-1 rounded-full text-xs tracking-widest uppercase text-purple-400 mb-3" style={{background:'rgba(168,85,247,0.15)',border:'1px solid rgba(168,85,247,0.2)'}}>{cr.category}</div>
            <div className="font-serif text-3xl text-white">{cr.word}</div>
          </div>
          <p className="text-center text-purple-300/50 text-xs">Describe it — don't say it, spell it, or rhyme it!</p>
          <div className="flex flex-wrap gap-2 min-h-10">
            {(cr.clues || []).map((c, i) => <span key={i} className="px-3 py-1.5 rounded-full text-sm animate-pop" style={{background:'rgba(168,85,247,0.15)',border:'1px solid rgba(168,85,247,0.25)',color:'#d8b4fe'}}>{c}</span>)}
          </div>
          <div className="flex gap-2">
            <input value={clue} onChange={e => setClue(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && clue.trim()) { onClue(clue.trim()); setClue(""); }}} placeholder="Type a clue…" maxLength={50}
              className="flex-1 py-3 px-4 rounded-xl bg-white/5 border border-white/10 text-sm outline-none focus:border-purple-500 focus:bg-purple-500/8 transition-all" />
            <button onClick={() => { if (clue.trim()) { onClue(clue.trim()); setClue(""); }}} className="px-5 py-3 rounded-xl text-white font-semibold text-sm" style={{background:'linear-gradient(135deg,#a855f7,#7c3aed)'}}>Send</button>
          </div>
          {canGoNext && (
            <button onClick={onNext} className="w-full py-3 rounded-xl font-semibold text-sm border border-purple-500/30 text-purple-300 hover:bg-purple-500/10 transition-all">
              Skip / Next Round →
            </button>
          )}
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          <div className="flex items-center justify-center gap-2 py-3 rounded-xl text-sm" style={{background:'rgba(168,85,247,0.07)',border:'1px solid rgba(168,85,247,0.15)'}}>
            <span className="text-purple-300/60">Category:</span>
            <strong className="text-purple-300">{cr.category}</strong>
          </div>
          <div className="flex flex-wrap gap-2 min-h-12 p-3 rounded-xl" style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)'}}>
            {!(cr.clues || []).length
              ? <span className="text-purple-300/30 text-sm animate-pulse-slow">Waiting for first clue…</span>
              : (cr.clues || []).map((c, i) => <span key={i} className="px-3 py-1.5 rounded-full text-sm animate-pop" style={{background:'rgba(110,180,255,0.12)',border:'1px solid rgba(110,180,255,0.2)',color:'#93c5fd'}}>{c}</span>)
            }
          </div>
          {feedback && (
            <div className={`text-center py-3 rounded-xl font-semibold text-sm animate-pop ${feedback.ok ? "bg-green-400/10 text-green-400 border border-green-400/20" : "bg-red-400/8 text-red-400 border border-red-400/15"}`}>
              {feedback.msg}
            </div>
          )}
          <div className="flex gap-2">
            <input value={guess} onChange={e => setGuess(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && guess.trim()) { onGuess(guess.trim()); setGuess(""); }}} placeholder="What's the word?" maxLength={40}
              className="flex-1 py-3 px-4 rounded-xl bg-white/5 border border-white/10 text-sm outline-none focus:border-blue-400 focus:bg-blue-500/5 transition-all" />
            <button onClick={() => { if (guess.trim()) { onGuess(guess.trim()); setGuess(""); }}} className="px-5 py-3 rounded-xl text-white font-semibold text-sm" style={{background:'linear-gradient(135deg,#6eb4ff,#7c3aed)'}}>Guess!</button>
          </div>
          {(cr.guesses || []).length > 0 && (
            <div className="flex gap-2 flex-wrap">
              {(cr.guesses || []).map((g, i) => (
                <span key={i} className={`px-3 py-1 rounded-full text-xs ${g.toLowerCase() === (cr.word || "").toLowerCase() ? "bg-green-400/10 text-green-400 border border-green-400/20" : "bg-red-400/8 text-red-300/60 border border-red-400/10"}`}>{g}</span>
              ))}
            </div>
          )}
        </div>
      )}
      <button onClick={onLeave} className="text-center text-purple-300/30 text-xs py-2 hover:text-purple-300/50 transition-colors">Leave Game</button>
    </div>
  );
}

// ── Result ────────────────────────────────────────────────────────────────────
function ResultScreen({ room, myId, onPlayAgain, onLeave }) {
  const players = room?.players || {}, scores = room?.scores || {};
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const winnerId = sorted[0]?.[0];
  return (
    <div className="flex flex-col items-center gap-4 fade-up">
      <div className="flex flex-col items-center gap-2 py-4">
        <div className="text-6xl" style={{animation:'float 3s ease-in-out infinite'}}>{winnerId === myId ? "🏆" : "💪"}</div>
        <h2 className="font-serif text-3xl shimmer-text">{winnerId === myId ? "You won! 🎉" : `${players[winnerId]?.name || "Partner"} wins! 🎉`}</h2>
      </div>
      <div className="w-full rounded-2xl overflow-hidden border border-white/8">
        {sorted.map(([id, pts]) => (
          <div key={id} className={`flex items-center justify-between px-5 py-4 border-b border-white/5 last:border-0 ${id === myId ? "bg-purple-500/8" : "bg-white/[0.02]"}`}>
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold" style={{background:'linear-gradient(135deg,#a855f7,#7c3aed)'}}>{players[id]?.name?.slice(0,2).toUpperCase()}</div>
              <span className="font-medium">{players[id]?.name || "Player"} {id === winnerId ? "👑" : ""}</span>
            </div>
            <span className="font-serif text-2xl text-purple-300">{pts}</span>
          </div>
        ))}
      </div>
      <PrimaryBtn onClick={onPlayAgain}>Play Again 🔄</PrimaryBtn>
      <GhostBtn onClick={onLeave}>Leave</GhostBtn>
    </div>
  );
}

// ── Shared UI ─────────────────────────────────────────────────────────────────
function Label({ children }) {
  return <div className="text-xs uppercase tracking-[3px] text-purple-400/60">{children}</div>;
}
function Input({ ...props }) {
  return <input {...props} className="w-full py-3 px-4 rounded-xl bg-white/5 border border-white/10 text-sm outline-none focus:border-purple-500 focus:bg-purple-500/8 transition-all placeholder:text-purple-300/30" />;
}
function PrimaryBtn({ onClick, disabled, children }) {
  return (
    <button onClick={onClick} disabled={disabled} className="w-full py-4 rounded-2xl font-semibold text-white text-base transition-all hover:-translate-y-0.5 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"
      style={{background:'linear-gradient(135deg,#a855f7,#7c3aed)',boxShadow:'0 4px 24px rgba(168,85,247,0.3)'}}>
      {children}
    </button>
  );
}
function GhostBtn({ onClick, children }) {
  return <button onClick={onClick} className="w-full py-2.5 text-purple-300/40 text-sm hover:text-purple-300/60 transition-colors">{children}</button>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
